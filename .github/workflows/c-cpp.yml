name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - name: Set up GH CLI
        uses: actions/setup-gh-cli@v1
        with:
          gh-version: '1.14.0'

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up C/C++ compiler
        uses: actions/setup-cxx@v1

      - name: Build
        run: gcc 1.c

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v0.01 ./a.out
